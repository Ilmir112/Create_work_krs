# .github/workflows/build.yml
name: Build PyInstaller
on: [push, pull_request]

env:
  DB_USER: ${{ secrets.DB_USER }}
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
  DB_HOST: ${{ secrets.DB_HOST }}
  DB_WELL_DATA: ${{ secrets.DB_WELL_DATA }}
  DB_NAME_USER: ${{ secrets.DB_NAME_USER }}
  DB_NAME_GNKT: ${{ secrets.DB_NAME_GNKT }}
  DB_PORT: ${{ secrets.DB_PORT }}

jobs:
  build:
    runs-on: windows-latest
    env:
      # UTF-8 для вывода Python в консоли Windows (иначе кириллица в print даёт UnicodeEncodeError)
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.8.8'

      # Секреты GitHub пробрасываются в env: выше → write_ci_env.py создаёт .env для PyInstaller.
      - name: Install, create .env from GitHub Secrets and build
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Set-Location $env:GITHUB_WORKSPACE
          pip install pyinstaller
          pip install -r requirements.txt
          python scripts/write_ci_env.py
          pyinstaller --noconfirm main.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZIMA
          path: dist/*
